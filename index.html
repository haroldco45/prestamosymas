<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libro Mayor — Cartera & Vehículos</title>
<meta name="description" content="Control de financiación, ventas de vehículos y socios capitalistas.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#15201A">
<meta property="og:title" content="Libro Mayor — Cartera & Vehículos">
<meta property="og:description" content="Control de financiación, ventas de vehículos y socios capitalistas.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#15201A;
    --bg-deep2:#1F2D22;
    --paper:#F6F1E4;
    --paper2:#EDE5CF;
    --ink:#20281F;
    --ink-soft:#5B6753;
    --gold:#B6873A;
    --gold-dark:#8C6526;
    --rojo:#8C3B2E;
    --verde:#3E6B4F;
    --line:#CBBE9C;
    --shadow:0 8px 24px rgba(21,32,26,.18);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg-deep);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh;}
  .display{font-family:'Fraunces',serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  /* ===== LOGIN ===== */
  #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:
      radial-gradient(circle at 20% 20%, rgba(182,135,58,.10), transparent 45%),
      radial-gradient(circle at 80% 80%, rgba(182,135,58,.08), transparent 45%),
      var(--bg-deep);}
  .login-card{background:var(--paper);width:100%;max-width:420px;border-radius:4px;padding:40px 32px 32px;
    box-shadow:var(--shadow);position:relative;border:1px solid var(--line);}
  .login-card::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;
    background:repeating-linear-gradient(90deg,var(--gold) 0 14px, transparent 14px 22px);
    border-radius:4px 4px 0 0;}
  .stamp{width:64px;height:64px;border:3px solid var(--gold-dark);border-radius:50%;display:flex;
    align-items:center;justify-content:center;margin:0 auto 18px;transform:rotate(-6deg);color:var(--gold-dark);}
  .stamp svg{width:32px;height:32px;}
  .login-card h1{font-size:1.5rem;text-align:center;margin:0 0 4px;letter-spacing:.01em;}
  .login-card p.sub{text-align:center;color:var(--ink-soft);margin:0 0 28px;font-size:.92rem;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:6px;font-weight:600;}
  .field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1.5px solid var(--line);
    border-radius:3px;background:#fff;font-size:.95rem;color:var(--ink);}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:var(--gold);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:3px;
    padding:11px 18px;font-weight:600;font-size:.88rem;letter-spacing:.01em;transition:transform .08s, opacity .15s;}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--bg-deep);color:var(--paper);width:100%;}
  .btn-primary:hover{background:var(--bg-deep2);}
  .btn-gold{background:var(--gold);color:#2b1c08;}
  .btn-gold:hover{background:var(--gold-dark);color:#fff;}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1.5px solid var(--line);}
  .btn-ghost:hover{border-color:var(--ink-soft);}
  .btn-wa{background:#3E6B4F;color:#fff;}
  .btn-print{background:var(--bg-deep2);color:var(--paper);}
  .btn-danger{background:var(--rojo);color:#fff;}
  .btn-sm{padding:7px 11px;font-size:.78rem;border-radius:3px;}
  .login-divider{display:flex;align-items:center;gap:10px;margin:22px 0;color:var(--ink-soft);font-size:.78rem;}
  .login-divider::before,.login-divider::after{content:"";flex:1;height:1px;background:var(--line);}
  .link-btn{background:none;border:none;color:var(--gold-dark);text-decoration:underline;font-size:.85rem;
    width:100%;text-align:center;font-weight:600;}
  #createBox{display:none;margin-top:16px;border-top:1px dashed var(--line);padding-top:16px;}
  .msg{font-size:.82rem;border-radius:3px;padding:9px 12px;margin-top:10px;}
  .msg-err{background:#F7E2DD;color:var(--rojo);}
  .msg-ok{background:#E2EEE5;color:var(--verde);}

  /* ===== APP SHELL ===== */
  #appShell{display:none;min-height:100vh;background:var(--paper2);}
  header.topbar{background:var(--bg-deep);color:var(--paper);padding:14px 20px;display:flex;align-items:center;
    justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:30;box-shadow:var(--shadow);}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .stamp{width:36px;height:36px;margin:0;border-width:2px;border-color:var(--gold);color:var(--gold);}
  .brand .stamp svg{width:18px;height:18px;}
  .brand-name{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:600;line-height:1.1;}
  .brand-name small{display:block;font-family:'Inter';font-size:.66rem;color:#C9C2AE;font-weight:500;letter-spacing:.05em;text-transform:uppercase;}
  .topbar-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .token-pill{background:var(--bg-deep2);border:1px solid #3a4a3d;color:var(--gold);padding:7px 12px;border-radius:20px;
    font-size:.78rem;display:flex;align-items:center;gap:8px;}
  .icon-btn{background:var(--bg-deep2);color:var(--paper);border:1px solid #3a4a3d;width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;}
  .icon-btn:hover{background:#2a3b2e;}
  .icon-btn svg{width:17px;height:17px;}

  nav.tabs{display:flex;gap:2px;background:var(--bg-deep2);padding:0 16px;overflow-x:auto;}
  nav.tabs button{background:transparent;border:none;color:#C9C2AE;padding:13px 16px;font-weight:600;font-size:.85rem;
    border-bottom:3px solid transparent;white-space:nowrap;}
  nav.tabs button.active{color:var(--gold);border-bottom-color:var(--gold);}

  main{max-width:1080px;margin:0 auto;padding:24px 20px 80px;}
  .section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
  .section-head h2{font-family:'Fraunces',serif;font-size:1.4rem;margin:0;}
  .section-head p{color:var(--ink-soft);font-size:.85rem;margin:2px 0 0;}

  .grid-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px;}
  .stat-card{background:var(--paper);border:1px solid var(--line);border-radius:4px;padding:16px;}
  .stat-card .lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:600;}
  .stat-card .val{font-family:'IBM Plex Mono',monospace;font-size:1.5rem;font-weight:600;margin-top:4px;}

  .card-list{display:flex;flex-direction:column;gap:12px;}
  .item-card{background:var(--paper);border:1px solid var(--line);border-radius:4px;padding:16px 18px;position:relative;}
  .item-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap;}
  .item-title{font-family:'Fraunces',serif;font-weight:600;font-size:1.05rem;}
  .item-sub{font-size:.82rem;color:var(--ink-soft);margin-top:2px;}
  .item-amount{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:1.1rem;text-align:right;}
  .item-amount small{display:block;font-family:'Inter';font-weight:600;font-size:.66rem;text-transform:uppercase;color:var(--ink-soft);}
  .sello{display:inline-block;border:2px solid;border-radius:4px;padding:2px 9px;font-size:.68rem;font-weight:700;
    letter-spacing:.06em;text-transform:uppercase;transform:rotate(-3deg);margin-top:6px;}
  .sello-ok{color:var(--verde);border-color:var(--verde);}
  .sello-pend{color:var(--gold-dark);border-color:var(--gold-dark);}
  .sello-venc{color:var(--rojo);border-color:var(--rojo);}
  .item-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px;border-top:1px dashed var(--line);padding-top:12px;}
  .item-meta{font-size:.78rem;color:var(--ink-soft);margin-top:8px;line-height:1.5;}
  .empty-state{text-align:center;padding:50px 20px;color:var(--ink-soft);}
  .empty-state .stamp{opacity:.4;}

  .fab{position:fixed;bottom:24px;right:24px;background:var(--gold);color:#2b1c08;border:none;border-radius:50%;
    width:58px;height:58px;font-size:1.8rem;box-shadow:var(--shadow);z-index:25;}

  /* ===== TABLA AMORTIZACIÓN ===== */
  .modal.modal-wide{max-width:780px;}
  .tabla-amort{width:100%;border-collapse:collapse;font-size:.8rem;margin-top:10px;}
  .tabla-amort th{background:var(--bg-deep);color:var(--paper);padding:7px 10px;text-align:right;font-weight:600;font-size:.72rem;letter-spacing:.04em;white-space:nowrap;}
  .tabla-amort th:first-child{text-align:center;}
  .tabla-amort td{padding:6px 10px;text-align:right;border-bottom:1px solid var(--line);font-family:'IBM Plex Mono',monospace;font-size:.78rem;}
  .tabla-amort td:first-child{text-align:center;font-family:'Inter';}
  .tabla-amort tr:hover td{background:var(--paper2);}
  .tr-pagado td{color:var(--ink-soft);}
  .tr-mora td{background:#fdf3f2;}
  .tr-mora td:first-child{color:var(--rojo);font-weight:700;}
  .tr-pendiente td:first-child{color:var(--gold-dark);font-weight:600;}
  .tr-activa td{background:#f0f6f2;font-weight:600;}
  .badge-mora{display:inline-block;background:var(--rojo);color:#fff;border-radius:3px;padding:1px 6px;font-size:.66rem;font-weight:700;letter-spacing:.04em;margin-left:4px;}
  .badge-ok{display:inline-block;background:var(--verde);color:#fff;border-radius:3px;padding:1px 6px;font-size:.66rem;font-weight:700;}
  .resumen-tabla{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px;}
  .resumen-tabla .stat-card{padding:12px;}

  /* ===== MODAL ===== */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(21,32,26,.55);z-index:50;align-items:flex-start;
    justify-content:center;padding:24px 16px;overflow-y:auto;}
  .modal{background:var(--paper);width:100%;max-width:520px;border-radius:5px;padding:26px 24px;margin:auto 0;box-shadow:var(--shadow);}
  .modal.modal-wide{max-width:860px;}
  .modal h3{font-family:'Fraunces',serif;margin:0 0 16px;font-size:1.25rem;}
  .modal-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;flex-wrap:wrap;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .habeas-note{font-size:.74rem;color:var(--ink-soft);background:var(--paper2);border-radius:3px;padding:8px 10px;margin-top:14px;line-height:1.5;}
  .abono-list{max-height:140px;overflow-y:auto;border:1px solid var(--line);border-radius:3px;padding:8px 10px;background:#fff;margin-top:6px;}
  .abono-row{display:flex;justify-content:space-between;font-size:.82rem;padding:4px 0;border-bottom:1px dashed var(--line);}
  .abono-row:last-child{border-bottom:none;}

  /* ===== RECEIPT / PRINT ===== */
  .receipt{background:#fff;width:100%;max-width:380px;margin:0 auto;padding:22px 20px;border:1px solid var(--line);
    position:relative;font-family:'IBM Plex Mono',monospace;font-size:.82rem;color:var(--ink);}
  .receipt::before,.receipt::after{content:"";position:absolute;left:0;right:0;height:14px;
    background-image:radial-gradient(circle, var(--bg-deep) 5px, transparent 5.5px);
    background-size:16px 16px;background-position:0 -3px;}
  .receipt::before{top:-7px;}
  .receipt::after{bottom:-7px;background-position:0 7px;}
  .receipt h4{font-family:'Fraunces',serif;text-align:center;margin:0 0 2px;font-size:1.1rem;}
  .receipt .sub{text-align:center;font-size:.7rem;color:var(--ink-soft);margin-bottom:14px;}
  .receipt hr{border:none;border-top:1px dashed var(--line);margin:10px 0;}
  .receipt .rline{display:flex;justify-content:space-between;margin:3px 0;}
  .receipt .total{font-weight:700;font-size:1rem;}
  .receipt .foot{text-align:center;font-size:.66rem;color:var(--ink-soft);margin-top:14px;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg-deep);color:var(--paper);
    padding:11px 20px;border-radius:24px;font-size:.85rem;z-index:99;box-shadow:var(--shadow);display:none;}

  .admin-panel .tok-display{font-family:'IBM Plex Mono',monospace;background:var(--bg-deep);color:var(--gold);
    padding:14px;border-radius:4px;font-size:1.1rem;letter-spacing:.08em;text-align:center;margin:10px 0;}
  .toggle-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed var(--line);}
  .switch{position:relative;width:42px;height:24px;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;inset:0;background:var(--line);border-radius:24px;transition:.2s;cursor:pointer;}
  .slider::before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
  input:checked + .slider{background:var(--verde);}
  input:checked + .slider::before{transform:translateX(18px);}

  footer.dev-credit{text-align:center;font-size:.68rem;color:#9aa394;padding:18px 12px 28px;}

  @media print{
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{position:absolute;top:0;left:0;width:100%;}
  }
  @media (max-width:560px){
    .row2{grid-template-columns:1fr;}
    main{padding:18px 12px 90px;}
  }
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="stamp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h18M7 15h2m4 0h4M5 5h14a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2z"/></svg></div>
    <h1 class="display">Libro Mayor</h1>
    <p class="sub">Financiación & vehículos</p>

    <div class="field">
      <label for="tokenInput">Código de acceso (token)</label>
      <input id="tokenInput" placeholder="Ej: CAUCASIA-001" autocomplete="off">
    </div>
    <button class="btn btn-primary" onclick="App.ingresar()">Ingresar al negocio</button>
    <div id="loginMsg"></div>

    <div class="login-divider">o</div>
    <button class="link-btn" onclick="App.toggleCreate()">Soy el administrador — crear negocio nuevo</button>

    <div id="createBox">
      <div class="field">
        <label for="negNombre">Nombre del negocio</label>
        <input id="negNombre" placeholder="Ej: Financiación & Vehículos Caucasia">
      </div>
      <div class="field">
        <label for="negTel">Celular del administrador</label>
        <input id="negTel" value="3117700431">
      </div>
      <button class="btn btn-gold" style="width:100%" onclick="App.crearNegocio()">Generar token y crear negocio</button>
    </div>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="appShell">
  <header class="topbar">
    <div class="brand">
      <div class="stamp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h18M7 15h2m4 0h4M5 5h14a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2z"/></svg></div>
      <div class="brand-name"><span id="negNombreLbl">—</span><small>Libro Mayor</small></div>
    </div>
    <div class="topbar-actions">
      <div class="token-pill">🔑 <span id="tokenLbl" class="mono"></span></div>
      <button class="icon-btn" title="Backup" onclick="App.backup()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
      </button>
      <button class="icon-btn" title="Restaurar backup" onclick="document.getElementById('restoreFile').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21V9m0 0l-4 4m4-4l4 4M4 7V5a2 2 0 012-2h12a2 2 0 012 2v2"/></svg>
      </button>
      <input type="file" id="restoreFile" accept="application/json" style="display:none" onchange="App.restore(event)">
      <button class="icon-btn" title="Administración" onclick="App.openAdmin()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.34 1.87l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.7 1.7 0 00-1.87-.34 1.7 1.7 0 00-1 1.56V21a2 2 0 11-4 0v-.09A1.7 1.7 0 008.6 19.4a1.7 1.7 0 00-1.87.34l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.7 1.7 0 004.6 15a1.7 1.7 0 00-1.56-1H3a2 2 0 110-4h.09A1.7 1.7 0 004.6 8.6a1.7 1.7 0 00-.34-1.87l-.06-.06a2 2 0 112.83-2.83l.06.06A1.7 1.7 0 008.6 4.6a1.7 1.7 0 001-1.56V3a2 2 0 114 0v.09a1.7 1.7 0 001 1.56 1.7 1.7 0 001.87-.34l.06-.06a2 2 0 112.83 2.83l-.06.06A1.7 1.7 0 0019.4 8.6a1.7 1.7 0 001.56 1H21a2 2 0 110 4h-.09a1.7 1.7 0 00-1.56 1z"/></svg>
      </button>
      <button class="icon-btn" title="Salir" onclick="App.logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4m7 14l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </header>

  <nav class="tabs" id="tabsNav"></nav>

  <main id="mainContent"></main>

  <button class="fab" id="fabBtn" onclick="App.fabAction()">+</button>

  <footer class="dev-credit">Desarrollada por Vibras Positivas HM — Derechos de Autor Reservados</footer>
</div>

<!-- ============ MODAL GENÉRICO ============ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBody"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   ESTADO Y PERSISTENCIA
   ========================================================= */
const App = {
  token: null,
  data: null,
  activeTab: 'resumen',
  editing: null, // {type, id}
  adminMode: false,

  STORAGE_PREFIX: 'negocio',

  blank(){
    return {
      info: { nombre:'', telefonoAdmin:'3117700431', creado:new Date().toISOString() },
      socios: [],
      clientes: [],
      prestamos: [],
      vehiculos: [],
      movimientos: []
    };
  },

  uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); },

  fmtMoney(n){
    n = Number(n)||0;
    return '$' + n.toLocaleString('es-CO', {maximumFractionDigits:0});
  },

  fmtDate(d){
    if(!d) return '—';
    const dt = new Date(d);
    return dt.toLocaleDateString('es-CO', {day:'2-digit',month:'short',year:'numeric'});
  },

  todayISO(){
    const tz = new Date().toLocaleString('en-US',{timeZone:'America/Bogota'});
    return new Date(tz).toISOString().slice(0,10);
  },

  toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    clearTimeout(this._toastT);
    this._toastT = setTimeout(()=> t.style.display='none', 2600);
  },

  genToken(){
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let s = '';
    for(let i=0;i<6;i++) s += chars[Math.floor(Math.random()*chars.length)];
    return 'CAU-' + s;
  },

  async save(){
    try{
      localStorage.setItem(`${this.STORAGE_PREFIX}:${this.token}`, JSON.stringify(this.data));
    }catch(e){
      console.error(e);
      this.toast('⚠️ Error guardando los datos en este dispositivo.');
    }
  },

  toggleCreate(){
    const box = document.getElementById('createBox');
    box.style.display = box.style.display === 'block' ? 'none' : 'block';
  },

  async crearNegocio(){
    const nombre = document.getElementById('negNombre').value.trim();
    const tel = document.getElementById('negTel').value.trim() || '3117700431';
    if(!nombre){ this.loginMsg('Escribe el nombre del negocio.', true); return; }
    const tok = this.genToken();
    const d = this.blank();
    d.info.nombre = nombre;
    d.info.telefonoAdmin = tel;
    try{
      localStorage.setItem(`${this.STORAGE_PREFIX}:${tok}`, JSON.stringify(d));
      this.loginMsg(`Negocio creado. Tu token es ${tok}. Guárdalo: por ahora la información queda solo en este celular o computador.`, false);
      document.getElementById('tokenInput').value = tok;
    }catch(e){
      console.error(e);
      this.loginMsg('No se pudo crear el negocio. Intenta de nuevo.', true);
    }
  },

  loginMsg(text, isErr){
    const el = document.getElementById('loginMsg');
    el.innerHTML = `<div class="msg ${isErr?'msg-err':'msg-ok'}">${text}</div>`;
  },

      if(!raw){ this.loginMsg('Ese código no existe en este dispositivo todavía. Si eres el administrador, créalo abajo, o restaura un backup después de ingresar.', true); return; }
      this.token = tok;
      this.data = JSON.parse(raw);
      // migración suave de campos faltantes
      this.data.socios = this.data.socios || [];
      this.data.clientes = this.data.clientes || [];
      this.data.prestamos = this.data.prestamos || [];
      this.data.vehiculos = this.data.vehiculos || [];
      this.data.movimientos = this.data.movimientos || [];
      this.boot();
    }catch(e){
      this.loginMsg('Ese código no existe en este dispositivo. Si eres el administrador, créalo abajo.', true);
    }
  },

  /* =========================================================
     SALDOS Y AMORTIZACIÓN (financiación a interés sobre saldos)
     ========================================================= */
  diasEntre(f1, f2){
    if(!f1 || !f2) return 0;
    const d = Math.floor((new Date(f2) - new Date(f1)) / 86400000);
    return Math.max(0, d);
  },
  addMonths(dateStr, months){
    const d = new Date(dateStr + 'T00:00:00');
    d.setMonth(d.getMonth() + months);
    return d.toISOString().slice(0,10);
  },
  calcCuotaFija(monto, tasa, cuotas){
    if(!cuotas || cuotas<=0) return 0;
    const i = tasa / 100;
    if(i===0) return Math.round(monto / cuotas);
    return Math.round(monto * (i * Math.pow(1+i, cuotas)) / (Math.pow(1+i, cuotas) - 1));
  },
  tablaAmortizacion(p){
    const cuotas = Number(p.cuotas)||0;
    if(!cuotas) return [];
    const monto = Number(p.monto);
    const i = (Number(p.tasa)||0) / 100;
    const cuotaFija = this.calcCuotaFija(monto, i*100, cuotas);
    let saldo = monto;
    const rows = [];
    for(let k=1; k<=cuotas; k++){
      const interes = Math.round(saldo * i);
      const capital = Math.min(Math.round(cuotaFija - interes), saldo);
      saldo = Math.max(0, saldo - capital);
      rows.push({n:k, fechaEsperada:this.addMonths(p.fecha, k), cuota:cuotaFija, interes, capital, saldoFinal:saldo});
    }
    if(rows.length && rows[rows.length-1].saldoFinal!==0){
      rows[rows.length-1].capital += rows[rows.length-1].saldoFinal;
      rows[rows.length-1].cuota   += rows[rows.length-1].saldoFinal;
      rows[rows.length-1].saldoFinal = 0;
    }
    return rows;
  },
  cuotasStatus(p){
    // Determina para cada cuota: pagado, pendiente, mora, activa
    const hoy = this.todayISO();
    const tabla = this.tablaAmortizacion(p);
    let dineroDisponible = (p.abonos||[]).reduce((a,x)=>a+Number(x.monto||0),0);
    let totalMora = 0;
    const resultado = tabla.map(row=>{
      let estado, diasRetraso=0, mora=0;
      if(dineroDisponible >= row.cuota){
        dineroDisponible -= row.cuota;
        estado = 'pagado';
      } else {
        const cuotaPendiente = row.cuota - dineroDisponible;
        dineroDisponible = 0;
        diasRetraso = this.diasEntre(row.fechaEsperada, hoy);
        if(diasRetraso > 0){
          // Mora = cuota × 6% ÷ 30 × días de retraso (sin días de gracia)
          mora = Math.round(cuotaPendiente * (0.06 / 30) * diasRetraso);
          totalMora += mora;
          estado = 'mora';
        } else if(row.fechaEsperada === hoy){
          estado = 'activa';
        } else {
          estado = 'pendiente';
        }
      }
      return {...row, estado, diasRetraso, mora};
    });
    return {filas:resultado, totalMora, dineroDisponible};
  },
  moraTotal(p){
    if(!p.cuotas) return 0;
    return this.cuotasStatus(p).totalMora;
  },
  saldoCapital(p){
    const abonadoCapital = (p.abonos||[]).reduce((a,x)=> a + Number(x.capital!==undefined ? x.capital : x.monto || 0), 0);
    return Math.max(0, Number(p.monto) - abonadoCapital);
  },
  interesPendiente(p, hastaFecha){
    if(p.cuotas) return 0; // En sistema de cuotas fijas el interés ya va dentro de la cuota
    hastaFecha = hastaFecha || this.todayISO();
    const fechaCorte = p.fechaUltimoCorte || p.fecha;
    const dias = this.diasEntre(fechaCorte, hastaFecha);
    const interesNuevo = this.saldoCapital(p) * ((Number(p.tasa)||0)/100) * (dias/30);
    return Math.max(0, (Number(p.interesAcumulado)||0) + interesNuevo);
  },
  saldoPrestamo(p){
    if(p.cuotas){
      // Sistema de cuotas fijas: saldo = total cuotas pendientes + mora
      const {filas, totalMora} = this.cuotasStatus(p);
      const cuotasPendientes = filas.filter(f=>f.estado!=='pagado').reduce((a,f)=>a+f.cuota,0);
      return cuotasPendientes + totalMora;
    }
    return this.saldoCapital(p) + this.interesPendiente(p);
  },
  saldoVehiculo(v){
    const abonado = (v.abonos||[]).reduce((a,x)=>a+Number(x.monto),0);
    return Math.max(0, Number(v.precio) - abonado);
  },
  estadoSello(saldo, fechaLimite){
    if(saldo<=0) return ['PAGADO','sello-ok'];
    if(fechaLimite && new Date(fechaLimite) < new Date(this.todayISO())) return ['VENCIDO','sello-venc'];
    return ['PENDIENTE','sello-pend'];
  },

      infoLinea = `Capital: ${this.fmtMoney(capital)} · Interés: ${this.fmtMoney(interes)}`;

  recalcCuota(){

  whatsappTabla(pid){
    const p = this.data.prestamos.find(x=>x.id===pid);
    const cli = this.data.clientes.find(c=>c.id===p.clienteId);
    const {filas, totalMora} = this.cuotasStatus(p);
    const cuotaFija = this.calcCuotaFija(p.monto, p.tasa, p.cuotas);
    const pagadas = filas.filter(f=>f.estado==='pagado').length;
    let txt = `*${this.data.info.nombre}*\n📋 Resumen de financiación\nCliente: ${cli?cli.nombre:''}\nCapital: ${this.fmtMoney(p.monto)}\nInterés: ${p.tasa}% mensual\nCuotas: ${p.cuotas} de ${this.fmtMoney(cuotaFija)}\nPagadas: ${pagadas}/${p.cuotas}\n`;
    if(totalMora>0) txt += `⚠️ Mora pendiente: ${this.fmtMoney(totalMora)}\n`;
    txt += `\n*Próximas cuotas:*\n`;
    filas.filter(f=>f.estado!=='pagado').slice(0,5).forEach(f=>{
      const icono = f.estado==='mora'?'🔴':f.estado==='activa'?'▶️':'⏳';
      txt += `${icono} Cuota ${f.n}: ${this.fmtDate(f.fechaEsperada)} — ${this.fmtMoney(f.cuota)}${f.mora>0?' +mora '+this.fmtMoney(f.mora):''}
`;

    window.open(this.waLink(cli?cli.celular:'', txt), '_blank');

  async saveCliente(id){
    const nombre = this.v('f_nombre').trim();
    if(!nombre){ this.toast('Escribe el nombre del cliente.'); return; }
    const obj = {nombre, cedula:this.v('f_cedula').trim(), celular:this.v('f_celular').trim(), email:this.v('f_email').trim(),
      direccion:this.v('f_direccion').trim(), observaciones:this.v('f_observaciones').trim(), formaPago:this.v('f_formaPago')};
    if(id){
      const i = this.data.clientes.findIndex(x=>x.id===id);
      this.data.clientes[i] = {...this.data.clientes[i], ...obj};
    } else {
      obj.id = this.uid();
      this.data.clientes.push(obj);
    }
    await this.save();
    this.closeModal();
    this.goTab('clientes');
    this.toast('Cliente guardado.');
  },

  async savePrestamo(id){
    if(!this.data.clientes.length){ this.toast('Registra un cliente primero.'); return; }
    const clienteId = this.v('f_clienteId');
    const monto = Number(this.v('f_monto'))||0;
    if(!clienteId || monto<=0){ this.toast('Selecciona el cliente y un monto válido.'); return; }
    const obj = {clienteId, monto, tasa:Number(this.v('f_tasa'))||0, cuotas:Number(this.v('f_cuotas'))||0, fecha:this.v('f_fecha'),
      fechaLimite:this.v('f_fechaLimite'), socioIds:this.getSelectedSocios(), observaciones:this.v('f_observaciones').trim()};
    if(id){
      const i = this.data.prestamos.findIndex(x=>x.id===id);
      this.data.prestamos[i] = {...this.data.prestamos[i], ...obj, monto:this.data.prestamos[i].monto};
    } else {
      obj.id = this.uid(); obj.abonos = []; obj.interesAcumulado = 0; obj.fechaUltimoCorte = obj.fecha;
      this.data.prestamos.push(obj);
      this.registrarMovimiento('Financiación nueva', `Financiación a ${this.clienteNombre(clienteId)}`, monto);
    }
    await this.save();
    this.closeModal();
    this.goTab('prestamos');
    this.toast('Financiación guardada.');
    if(!id) this.whatsappFicha('prestamo', this.data.prestamos[this.data.prestamos.length-1].id);

  openAbono(type, id){

    const coll = type==='prestamo' ? this.data.prestamos : this.data.vehiculos;
    const item = coll.find(x=>x.id===id);

    if(type==='prestamo' && item.cuotas){
      const {filas, totalMora} = this.cuotasStatus(item);
      const cuotaFija = this.calcCuotaFija(item.monto, item.tasa, item.cuotas);
      const cuotaActual = filas.find(f=>f.estado==='mora'||f.estado==='activa') || filas.find(f=>f.estado==='pendiente');
      sugerido = cuotaActual ? cuotaActual.cuota + (cuotaActual.mora||0) : 0;

      if(totalMora>0) moraInfo=`<div class="habeas-note" style="background:#fdf3f2;color:var(--rojo)">⚠️ Mora acumulada: <strong>${this.fmtMoney(totalMora)}</strong>. Se recomienda cobrar la cuota + mora: <strong>${this.fmtMoney(sugerido)}</strong></div>`;

      const capital = this.saldoCapital(item);
      const interes = this.interesPendiente(item);
      saldoInfo = `Capital pendiente: <strong>${this.fmtMoney(capital)}</strong> · Interés pendiente: <strong>${this.fmtMoney(interes)}</strong>`;
      sugerido = interes;
    } else {
      saldoInfo = `Saldo actual: <strong>${this.fmtMoney(this.saldoVehiculo(item))}</strong>`;
    }
    const rows = (item.abonos||[]).slice().reverse().slice(0,8).map(a=>{
      if(type==='prestamo' && a.capital!==undefined){
        return `<div class="abono-row"><span>${this.fmtDate(a.fecha)}</span><span>${this.fmtMoney(a.monto)} <small style="color:var(--ink-soft)">(cap. ${this.fmtMoney(a.capital)} + int. ${this.fmtMoney(a.interes)}${a.mora?` + mora ${this.fmtMoney(a.mora)}`:''})</small></span></div>`;
      }
      return `<div class="abono-row"><span>${this.fmtDate(a.fecha)}</span><span>${this.fmtMoney(a.monto)}</span></div>`;
    }).join('') || '<div class="abono-row"><span>Sin abonos registrados</span></div>';

      <h3>Registrar abono</h3>

        <button class="btn btn-ghost" onclick="App.closeModal()">Cancelar</button>

  async confirmAbono(type, id){
    const monto = Number(this.v('f_abonoMonto'))||0;
    if(monto<=0){ this.toast('Escribe un monto válido.'); return; }
    const fecha = this.v('f_abonoFecha');
    const coll = type==='prestamo' ? this.data.prestamos : this.data.vehiculos;
    const item = coll.find(x=>x.id===id);
    item.abonos = item.abonos || [];

    let abonoExtra = {}; // datos adicionales para el comprobante

    if(type==='prestamo' && item.cuotas){
      // Capturamos la cuota que se está pagando ANTES de agregar el abono
      const {filas, totalMora} = this.cuotasStatus(item);
      const cuotaActual = filas.find(f=>f.estado==='mora'||f.estado==='activa') || filas.find(f=>f.estado==='pendiente');
      const numeroCuota = cuotaActual ? cuotaActual.n : '?';
      const moraCuota = cuotaActual ? (cuotaActual.mora||0) : 0;
      // Desglose: el abono paga mora primero, luego la cuota (interés + capital)
      const moraPagada = Math.min(monto, moraCuota);
      const restanteTrasMora = monto - moraPagada;
      // Capital e interés de la cuota actual de la tabla
      const interesTabla = cuotaActual ? cuotaActual.interes : 0;
      const capitalTabla  = cuotaActual ? cuotaActual.capital : 0;
      const interesPagado = Math.min(restanteTrasMora, interesTabla);
      const capitalPagado = Math.min(restanteTrasMora - interesPagado, capitalTabla);
      abonoExtra = {numeroCuota, capital:capitalPagado, interes:interesPagado, mora:moraPagada};
      item.abonos.push({fecha, monto, ...abonoExtra});
      this.registrarMovimiento('Abono cuota', `Abono cuota #${numeroCuota} de ${this.clienteNombre(item.clienteId)}${moraPagada>0?' (incl. mora '+this.fmtMoney(moraPagada)+')':''}`, monto);

    } else if(type==='prestamo'){
      const capitalAntes = this.saldoCapital(item);
      const interesAcumuladoHoy = this.interesPendiente(item, fecha);
      const interesPagado = Math.min(monto, interesAcumuladoHoy);
      let capitalPagado = Math.max(0, monto - interesPagado);
      if(capitalPagado > capitalAntes) capitalPagado = capitalAntes;
      item.interesAcumulado = Math.max(0, interesAcumuladoHoy - interesPagado);
      item.fechaUltimoCorte = fecha;
      abonoExtra = {capital:capitalPagado, interes:interesPagado, mora:0};
      item.abonos.push({fecha, monto, ...abonoExtra});
      this.registrarMovimiento('Abono', `Abono de ${this.clienteNombre(item.clienteId)} (capital ${this.fmtMoney(capitalPagado)} + interés ${this.fmtMoney(interesPagado)})`, monto);

    } else {
      item.abonos.push({fecha, monto});
      this.registrarMovimiento('Abono', `Abono de ${this.clienteNombre(item.clienteId)}`, monto);
    }

    await this.save();
    this.closeModal();
    this.goTab(this.activeTab==='resumen'?'resumen':(type==='prestamo'?'prestamos':'vehiculos'));
    this.toast('Abono registrado.');
    this.whatsappAbono(type, id, monto, fecha, abonoExtra);
  },

  /* =========================================================
     IMPRESIÓN
     ========================================================= */
  buildReceiptHTML(tipo, item){
    const neg = this.data.info.nombre;
    if(tipo==='cliente'){
      return `<h4>${neg}</h4><div class="sub">Ficha de cliente</div><hr>
        <div class="rline"><span>Nombre</span><span>${item.nombre}</span></div>
        <div class="rline"><span>Cédula</span><span>${item.cedula||'—'}</span></div>
        <div class="rline"><span>Celular</span><span>${item.celular||'—'}</span></div>
        <div class="rline"><span>Correo</span><span>${item.email||'—'}</span></div>
        <div class="rline"><span>Dirección</span><span>${item.direccion||'—'}</span></div>
        <div class="rline"><span>Forma de pago</span><span>${item.formaPago||'—'}</span></div>
        ${item.observaciones?`<hr><div class="rline"><span>Obs.</span><span>${item.observaciones}</span></div>`:''}
        <div class="foot">Generado ${this.fmtDate(this.todayISO())}</div>`;
    }
    if(tipo==='prestamo'){
      const cuotaFija = item.cuotas ? this.calcCuotaFija(item.monto, item.tasa, item.cuotas) : 0;
      const totalMora = item.cuotas ? this.moraTotal(item) : 0;
      const pagadas = item.cuotas ? this.cuotasStatus(item).filas.filter(f=>f.estado==='pagado').length : 0;
      const capital = this.saldoCapital(item);
      const interes = item.cuotas ? 0 : this.interesPendiente(item);
      const saldo = this.saldoPrestamo(item);
      return `<h4>${neg}</h4><div class="sub">Comprobante de financiación</div><hr>
        <div class="rline"><span>Cliente</span><span>${this.clienteNombre(item.clienteId)}</span></div>
        <div class="rline"><span>Fecha</span><span>${this.fmtDate(item.fecha)}</span></div>
        <div class="rline"><span>Capital inicial</span><span>${this.fmtMoney(item.monto)}</span></div>
        <div class="rline"><span>Interés mensual</span><span>${item.tasa||0}%</span></div>
        ${item.cuotas?`<div class="rline"><span>Cuotas pactadas</span><span>${item.cuotas} × ${this.fmtMoney(cuotaFija)}</span></div>
        <div class="rline"><span>Cuotas pagadas</span><span>${pagadas} de ${item.cuotas}</span></div>`:`<div class="rline"><span>Interés pendiente</span><span>${this.fmtMoney(interes)}</span></div>`}
        <hr>
        <div class="rline"><span>Capital pendiente</span><span>${this.fmtMoney(capital)}</span></div>
        ${totalMora>0?`<div class="rline" style="color:#8C3B2E"><span>⚠️ Mora</span><span>${this.fmtMoney(totalMora)}</span></div>`:''}
        <div class="rline total"><span>Total a pagar hoy</span><span>${this.fmtMoney(saldo)}</span></div>
        <div class="foot">Documento de soporte interno — ${neg}</div>`;
    }
    if(tipo==='vehiculo'){
      const saldo = this.saldoVehiculo(item);
      return `<h4>${neg}</h4><div class="sub">Comprobante de venta de vehículo</div><hr>
        <div class="rline"><span>Comprador</span><span>${this.clienteNombre(item.clienteId)}</span></div>
        <div class="rline"><span>Vehículo</span><span>${item.marca} ${item.modelo}</span></div>
        <div class="rline"><span>Placa</span><span>${item.placa||'—'}</span></div>
        <div class="rline"><span>Fecha de venta</span><span>${this.fmtDate(item.fecha)}</span></div>
        <div class="rline"><span>Precio</span><span>${this.fmtMoney(item.precio)}</span></div>
        <hr><div class="rline total"><span>Saldo actual</span><span>${this.fmtMoney(saldo)}</span></div>
        <div class="foot">Documento de soporte interno — ${neg}</div>`;
    }
    if(tipo==='socio'){
      return `<h4>${neg}</h4><div class="sub">Ficha de socio</div><hr>
        <div class="rline"><span>Nombre</span><span>${item.nombre}</span></div>
        <div class="rline"><span>Celular</span><span>${item.celular||'—'}</span></div>
        <hr><div class="rline total"><span>Capital aportado</span><span>${this.fmtMoney(item.capital)}</span></div>
        <div class="foot">Generado ${this.fmtDate(this.todayISO())}</div>`;
    }
    return '';
  },

  imprimirFicha(tipo, id){
    const colls = {cliente:'clientes', prestamo:'prestamos', vehiculo:'vehiculos', socio:'socios'};
    const item = this.data[colls[tipo]].find(x=>x.id===id);
    let area = document.getElementById('printArea');
    if(!area){ area = document.createElement('div'); area.id='printArea'; area.style.display='none'; document.body.appendChild(area); }
    area.innerHTML = `<div class="receipt">${this.buildReceiptHTML(tipo, item)}</div>`;
    area.style.display='block';
    setTimeout(()=>{ window.print(); area.style.display='none'; }, 80);
  },

  /* =========================================================
     WHATSAPP
     ========================================================= */
  waLink(phone, text){
    let p = (phone||'').replace(/\D/g,'');
    if(p.length===10) p = '57'+p;
    if(!p) p = (this.data.info.telefonoAdmin||'').replace(/\D/g,'');
    if(p.length===10) p = '57'+p;
    return `https://wa.me/${p}?text=${encodeURIComponent(text)}`;
  },

  whatsappFicha(tipo, id){
    const colls = {cliente:'clientes', prestamo:'prestamos', vehiculo:'vehiculos', socio:'socios'};
    const item = this.data[colls[tipo]].find(x=>x.id===id);
    const neg = this.data.info.nombre;
    let txt = '', phone = '';
    if(tipo==='cliente'){
      txt = `*${neg}*\nFicha de cliente\nNombre: ${item.nombre}\nCédula: ${item.cedula||'—'}\nCelular: ${item.celular||'—'}\nCorreo: ${item.email||'—'}\nDirección: ${item.direccion||'—'}\nForma de pago: ${item.formaPago||'—'}`;
      phone = item.celular;
    }
    if(tipo==='prestamo'){
      const cli = this.data.clientes.find(c=>c.id===item.clienteId);
      const cuotaFija = item.cuotas ? this.calcCuotaFija(item.monto, item.tasa, item.cuotas) : 0;
      const totalMora = item.cuotas ? this.moraTotal(item) : 0;
      const pagadas = item.cuotas ? this.cuotasStatus(item).filas.filter(f=>f.estado==='pagado').length : 0;
      const capital = this.saldoCapital(item);
      const interes = item.cuotas ? 0 : this.interesPendiente(item);
      const saldo = this.saldoPrestamo(item);
      txt = `*${neg}*\nComprobante de financiación\nCliente: ${cli?cli.nombre:''}\nCapital inicial: ${this.fmtMoney(item.monto)}\nInterés mensual: ${item.tasa||0}%`;
      if(item.cuotas) txt += `\nCuotas: ${item.cuotas} de ${this.fmtMoney(cuotaFija)}\nPagadas: ${pagadas}/${item.cuotas}`;
      txt += `\nCapital pendiente: ${this.fmtMoney(capital)}`;
      if(!item.cuotas) txt += `\nInterés pendiente: ${this.fmtMoney(interes)}`;
      if(totalMora>0) txt += `\n⚠️ Mora: ${this.fmtMoney(totalMora)}`;
      txt += `\nTotal a pagar hoy: ${this.fmtMoney(saldo)}`;
      phone = cli?cli.celular:'';
    }
    if(tipo==='vehiculo'){
      const cli = this.data.clientes.find(c=>c.id===item.clienteId);
      txt = `*${neg}*\nComprobante de venta\n${item.tipo==='carro'?'Carro':'Moto'}: ${item.marca} ${item.modelo} ${item.placa?'· '+item.placa:''}\nComprador: ${cli?cli.nombre:''}\nPrecio: ${this.fmtMoney(item.precio)}\nSaldo actual: ${this.fmtMoney(this.saldoVehiculo(item))}`;
      phone = cli?cli.celular:'';
    }
    if(tipo==='socio'){
      txt = `*${neg}*\nFicha de socio\nNombre: ${item.nombre}\nCapital aportado: ${this.fmtMoney(item.capital)}`;
      phone = item.celular;
    }
    window.open(this.waLink(phone, txt), '_blank');
  },

  saludoColombia(){
    const hora = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Bogota'})).getHours();
    if(hora>=5 && hora<12) return 'Buenos días';
    if(hora>=12 && hora<19) return 'Buenas tardes';
    return 'Buenas noches';
  },

  whatsappAbono(type, id, monto, fecha, abonoExtra={}){
    const coll = type==='prestamo' ? this.data.prestamos : this.data.vehiculos;
    const item = coll.find(x=>x.id===id);
    const cli = this.data.clientes.find(c=>c.id===item.clienteId);
    const neg = this.data.info.nombre;
    const saludo = this.saludoColombia();
    let txt;

    if(type==='prestamo'){
      const nuevoSaldo = this.saldoPrestamo(item);
      const {numeroCuota, capital=0, interes=0, mora=0} = abonoExtra;
      const nombreMayus = (cli?cli.nombre:'').toUpperCase();

      if(item.cuotas && numeroCuota){
        // Formato exacto tipo banco con cuotas
        txt =
`${saludo}
Bendiciones

*REPORTE DE PAGO*
${nombreMayus}

*Cuota #${numeroCuota}* ${this.fmtMoney(item.cuotas? this.calcCuotaFija(item.monto, item.tasa, item.cuotas) : monto)}
*Fecha Pago* ${this.fmtDate(fecha)}
*Abono Capital* ${this.fmtMoney(capital)}
*Intereses* ${this.fmtMoney(interes)}
*Compensación Moratoria* ${this.fmtMoney(mora)}
*NUEVO SALDO* ${this.fmtMoney(nuevoSaldo)}

_"¡Muchas gracias por su pago!_
_Valoramos su compromiso para con nosotros"_`;
      } else {
        // Sin cuotas: desglose libre
        txt =
`${saludo}
Bendiciones

*REPORTE DE PAGO*
${nombreMayus}

*Fecha Pago* ${this.fmtDate(fecha)}
*Abono Capital* ${this.fmtMoney(capital)}
*Intereses* ${this.fmtMoney(interes)}
*NUEVO SALDO* ${this.fmtMoney(nuevoSaldo)}

_"¡Muchas gracias por su pago!_
_Valoramos su compromiso para con nosotros"_`;
      }
    } else {
      const saldo = this.saldoVehiculo(item);
      const nombreMayus = (cli?cli.nombre:'').toUpperCase();
      txt =
`${saludo}
Bendiciones

*REPORTE DE PAGO*
${nombreMayus}

*Vehículo* ${item.marca} ${item.modelo}${item.placa?' ('+item.placa+')':''}
*Fecha Pago* ${this.fmtDate(fecha)}
*Abono* ${this.fmtMoney(monto)}
*NUEVO SALDO* ${this.fmtMoney(saldo)}

_"¡Muchas gracias por su pago!_
_Valoramos su compromiso para con nosotros"_`;
    }
    window.open(this.waLink(cli?cli.celular:'', txt), '_blank');
  },

  /* =========================================================
     ADMIN / BACKUP / RESTORE
     ========================================================= */
  toggleAdminMode(){
    this.adminMode = !this.adminMode;
    this.goTab(this.activeTab);
  },

  openAdmin(){
    document.getElementById('modalBody').innerHTML = `
      <h3>Administración</h3>
      <div class="admin-panel">
        <p class="item-sub">⚠️ Por ahora la información se guarda <strong>solo en este celular o computador</strong> (no se sincroniza sola todavía). Para pasar los datos a otro dispositivo: usa "Backup" aquí, y en el otro dispositivo entra con este mismo token y usa "Restaurar backup" con ese archivo.</p>
        <div class="tok-display">${this.token}</div>
        <div class="modal-actions" style="justify-content:center">
          <button class="btn btn-sm btn-ghost" onclick="App.copyToken()">📋 Copiar token</button>
          <button class="btn btn-sm btn-wa" onclick="App.shareToken()">💬 Enviar por WhatsApp</button>
        </div>
        <div class="toggle-row">
          <span>Modo administrador (ver datos completos)</span>
          <label class="switch"><input type="checkbox" ${this.adminMode?'checked':''} onchange="App.toggleAdminMode()"><span class="slider"></span></label>
        </div>
        <div class="field" style="margin-top:14px"><label>Nombre del negocio</label><input id="f_negNombre" value="${this.data.info.nombre}"></div>
        <div class="field"><label>Celular del administrador</label><input id="f_negTel" value="${this.data.info.telefonoAdmin}"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="App.closeModal()">Cerrar</button>
          <button class="btn btn-primary" onclick="App.saveAdminInfo()">Guardar cambios</button>
        </div>
      </div>`;
    document.getElementById('modalOverlay').style.display='flex';
  },

  async saveAdminInfo(){
    this.data.info.nombre = this.v('f_negNombre').trim() || this.data.info.nombre;
    this.data.info.telefonoAdmin = this.v('f_negTel').trim() || this.data.info.telefonoAdmin;
    await this.save();
    document.getElementById('negNombreLbl').textContent = this.data.info.nombre;
    this.closeModal();
    this.toast('Datos del negocio actualizados.');
  },

  copyToken(){
    navigator.clipboard?.writeText(this.token);
    this.toast('Token copiado: ' + this.token);
  },

  shareToken(){
    const txt = `Código de acceso para *${this.data.info.nombre}* en Libro Mayor:\n\n${this.token}\n\nGuárdalo. Por ahora úsalo junto con el archivo de backup para llevar la información a otro celular o PC.`;
    window.open(this.waLink(this.data.info.telefonoAdmin, txt), '_blank');
  },

  backup(){
    const blob = new Blob([JSON.stringify({token:this.token, ...this.data}, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `backup-${this.token}-${this.todayISO()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    this.toast('Backup descargado.');
  },

  restore(ev){
    const file = ev.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      try{
        const parsed = JSON.parse(reader.result);
        if(!confirm('Esto reemplazará la información actual del negocio con la del backup. ¿Continuar?')) return;
        delete parsed.token;
        this.data = parsed;
        await this.save();
        this.boot();
        this.toast('Backup restaurado correctamente.');
      }catch(e){
        this.toast('El archivo no es un backup válido.');
      }
    };
    reader.readAsText(file);
    ev.target.value = '';
  }
};

document.getElementById('modalOverlay').addEventListener('click', (e)=>{
  if(e.target.id==='modalOverlay') App.closeModal();
});
</script>
</body>
</html>
